name: EAS Development Update

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-update:
    name: Publish development update
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --branch development --message "${{ github.event.head_commit.message || github.sha }}" --non-interactive
